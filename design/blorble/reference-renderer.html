<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Blorb reference renderer — CANONICAL (locked 2026-07-01)</title>
    <!--
      This file is the golden master for the Blorble game pieces.
      - Open it in any browser to see the attribute legend + the FULL 81-card deck.
      - The renderBlorb() function below is the approved implementation: port it
        VERBATIM into the game's src/blorb.ts (typed), do not re-derive the art.
      - Pairs with BLORB-SPEC.md (rules/pitfalls) and blorb-reference-sheet.png.
    -->
    <style>
      body { margin: 0; background: #fbf8f3; color: #3a2c26; font-family: ui-sans-serif, system-ui, sans-serif; padding: 18px 22px; }
      h1 { font-size: 22px; margin: 0 0 2px; }
      h2 { font-size: 15px; margin: 18px 0 8px; }
      .sub { color: #8a7d74; font-size: 13px; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; }
      .deck { display: grid; grid-template-columns: repeat(9, 96px); gap: 10px; }
      .tile { background: #f4f0ea; border-radius: 14px; padding: 6px; width: 96px; box-sizing: border-box; }
      .cap { font-size: 11px; color: #6b5d54; text-align: center; margin-top: 3px; }
    </style>
  </head>
  <body>
    <h1>Blorbs — canonical reference renderer 👾</h1>
    <div class="sub">Four channels × three values. Species trim fixed: outline · googly eyes · antennae · fang · no hands.</div>
    <div id="app"></div>
    <script>
      // ======================= CANONICAL RENDERER (copy verbatim) =======================
      const INK = "#2a2320";
      const COLORS = ["#3f9fe0", "#f2953c", "#e56aa8"]; // blue / orange / pink (CVD check at build)

      const hx = (h) => [1, 3, 5].map((i) => parseInt(h.slice(i, i + 2), 16));
      const toHex = (r, g, b) =>
        "#" + [r, g, b].map((v) => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, "0")).join("");
      const darken = (h, f) => { const [r, g, b] = hx(h); return toHex(r * (1 - f), g * (1 - f), b * (1 - f)); };

      // Body silhouettes: round / ghost / teardrop(curled tip). `a` = attribute string.
      const SHAPES = [
        (a) => `<circle cx="100" cy="116" r="78" ${a}/>`,
        (a) => `<path d="M30 160 C24 82 50 30 100 30 C150 30 176 82 170 160 C170 188 123 188 123 160 C123 188 77 188 77 160 C77 188 30 188 30 160 Z" ${a}/>`,
        (a) => `<path d="M112 30 C118 52 168 96 166 132 a66 66 0 1 1 -132 1 C34 96 82 52 94 42 C100 34 105 30 112 30 Z" ${a}/>`,
      ];
      // Per-shape blotch layouts (r=16) — tuned so spots stay visible and clear the face.
      const BLOTCH = [
        [[100, 52], [46, 100], [154, 100], [56, 166], [144, 166], [100, 188]], // round
        [[100, 50], [46, 92], [154, 92], [46, 148], [154, 148], [100, 180]],   // ghost
        [[100, 54], [54, 132], [146, 132], [78, 176], [122, 176]],             // teardrop
      ];

      const eyesSvg = (n) => {
        const xs = Array.from({ length: n }, (_, i) => 100 + (i - (n - 1) / 2) * 42);
        return xs
          .map(
            (x) =>
              `<circle cx="${x}" cy="104" r="18" fill="#fff" stroke="${INK}" stroke-width="3"/>` +
              `<circle cx="${x + 1}" cy="106" r="9" fill="${INK}"/>` +
              `<circle cx="${x - 4}" cy="99" r="3.4" fill="#fff"/>`,
          )
          .join("");
      };

      // card = [colour 0-2, eyes 0-2 (renders 1-3), shape 0-2, pattern 0-2 (solid/spots/stripes)]
      // uid must be unique per <svg> on the page (clipPath ids are document-global).
      const renderBlorb = (card, uid) => {
        const [ci, ei, si, pi] = card;
        const clip = `bclip-${uid}`;
        const color = COLORS[ci];
        const dk = darken(color, 0.44);
        const el = SHAPES[si];
        const pattern =
          pi === 1
            ? `<g clip-path="url(#${clip})">${BLOTCH[si].map(([x, y]) => `<circle cx="${x}" cy="${y}" r="16" fill="${dk}"/>`).join("")}</g>`
            : pi === 2
              ? `<g clip-path="url(#${clip})">${[50, 92, 134, 176].map((y) => `<path d="M-24 ${y} Q100 ${y + 17} 224 ${y}" fill="none" stroke="${dk}" stroke-width="21"/>`).join("")}</g>`
              : "";
        return (
          `<svg viewBox="0 0 200 214" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">` +
          // NOTE: clipPath children must be raw shapes — a <g> wrapper silently clips everything away.
          `<defs><clipPath id="${clip}">${el("")}</clipPath></defs>` +
          // 1. antennae (behind body)
          `<g stroke="${INK}" stroke-width="3" stroke-linecap="round"><line x1="84" y1="46" x2="72" y2="16"/><line x1="116" y1="46" x2="128" y2="16"/></g>` +
          `<circle cx="72" cy="13" r="6" fill="${INK}"/><circle cx="128" cy="13" r="6" fill="${INK}"/>` +
          // 2. body fill (no stroke)
          el(`fill="${color}"`) +
          // 3. pattern, clipped to the FULL body (markings reach the edge)
          pattern +
          // 4. crisp outline ON TOP (never covered by the pattern)
          el(`fill="none" stroke="${INK}" stroke-width="4.5"`) +
          // 5. face
          eyesSvg(ei + 1) +
          `<path d="M84 148 Q100 172 116 148 Z" fill="${INK}"/><path d="M94 148 L102 148 L98 158 Z" fill="#fff"/>` +
          `</svg>`
        );
      };
      // ===================== END CANONICAL RENDERER =====================

      // --- page assembly: legend + full 81-card deck ---
      const tile = (svg, cap) =>
        `<div><div class="tile">${svg}</div>${cap ? `<div class="cap">${cap}</div>` : ""}</div>`;
      const row = (cards, caps, p) =>
        `<div class="row">${cards.map((c, i) => tile(renderBlorb(c, `${p}${i}`), caps[i])).join("")}</div>`;

      let html = "";
      html += `<h2>Colour</h2>` + row([[0,1,0,0],[1,1,0,0],[2,1,0,0]], ["blue","orange","pink"], "lc");
      html += `<h2>Eyes</h2>` + row([[0,0,0,0],[0,1,0,0],[0,2,0,0]], ["1","2","3"], "le");
      html += `<h2>Silhouette</h2>` + row([[0,1,0,0],[0,1,1,0],[0,1,2,0]], ["round","ghost","teardrop"], "ls");
      html += `<h2>Pattern</h2>` + row([[0,1,0,0],[0,1,0,1],[0,1,0,2]], ["solid","spots","stripes"], "lp");
      html += `<h2>The full deck — all 81 Blorbs</h2><div class="deck">`;
      let k = 0;
      for (let c = 0; c < 3; c++)
        for (let e = 0; e < 3; e++)
          for (let s = 0; s < 3; s++)
            for (let p = 0; p < 3; p++) html += `<div class="tile">${renderBlorb([c, e, s, p], "d" + k++)}</div>`;
      html += `</div>`;
      document.getElementById("app").innerHTML = html;
    </script>
  </body>
</html>
