<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Blorb art v2 — variant playground (R0/R1)</title>
    <style>
      body { margin: 0; background: #fbf8f3; color: #3a2c26; font-family: ui-sans-serif, system-ui, sans-serif; padding: 18px 22px; }
      h1 { font-size: 22px; margin: 0 0 2px; }
      h2 { font-size: 15px; margin: 22px 0 8px; }
      .sub { color: #8a7d74; font-size: 13px; margin-bottom: 4px; }
      .cols { display: grid; grid-template-columns: repeat(4, 210px); gap: 14px; }
      .colhead { font-size: 13px; font-weight: 600; text-align: center; margin-bottom: 6px; color: #4a3a32; }
      .colsub { font-size: 10px; font-weight: 400; color: #8a7d74; display: block; }
      .tile { background: #f4f0ea; border-radius: 14px; padding: 8px; box-sizing: border-box; margin-bottom: 8px; }
      .minirow { display: flex; gap: 6px; align-items: flex-end; background: #efe9e0; border-radius: 10px; padding: 8px; }
      .mini { width: 28px; height: 30px; }
      .cap { font-size: 10px; color: #6b5d54; text-align: center; margin-top: 2px; }
    </style>
  </head>
  <body>
    <h1>Blorb art v2 — variant playground 🎨</h1>
    <div class="sub">R0/R1: current art vs. candidates A/B/C. Judge spots + stripes readability, especially at mini size (28px).</div>
    <div id="app"></div>
    <script>
      // ======================= SHARED (unchanged from canonical) =======================
      const INK = "#2a2320";
      const COLORS = ["#1f97f0", "#f2953c", "#eb648c"]; // blue / orange / pink

      const hx = (h) => [1, 3, 5].map((i) => parseInt(h.slice(i, i + 2), 16));
      const toHex = (r, g, b) =>
        "#" + [r, g, b].map((v) => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, "0")).join("");
      const darken = (h, f) => { const [r, g, b] = hx(h); return toHex(r * (1 - f), g * (1 - f), b * (1 - f)); };
      const lighten = (h, f) => { const [r, g, b] = hx(h); return toHex(r + (255 - r) * f, g + (255 - g) * f, b + (255 - b) * f); };

      const SHAPES = [
        (a) => `<circle cx="100" cy="116" r="78" ${a}/>`,
        (a) => `<path d="M30 160 C24 82 50 30 100 30 C150 30 176 82 170 160 C170 188 123 188 123 160 C123 188 77 188 77 160 C77 188 30 188 30 160 Z" ${a}/>`,
        (a) => `<path d="M112 30 C118 52 168 96 166 132 a66 66 0 1 1 -132 1 C34 96 82 52 94 42 C100 34 105 30 112 30 Z" ${a}/>`,
      ];
      const BLOTCH = [
        [[100, 52], [46, 100], [154, 100], [56, 166], [144, 166], [100, 188]], // round
        [[100, 50], [46, 92], [154, 92], [46, 148], [154, 148], [100, 180]],   // ghost
        [[100, 54], [54, 132], [146, 132], [78, 176], [122, 176]],             // teardrop
      ];
      const BELLY = [
        { cx: 100, cy: 150, rx: 34, ry: 42 }, // round
        { cx: 100, cy: 150, rx: 30, ry: 46 }, // ghost
        { cx: 100, cy: 150, rx: 30, ry: 40 }, // teardrop
      ];
      const STRIPE_BANDS = [50, 92, 134, 176];

      const eyesSvg = (n) => {
        const xs = Array.from({ length: n }, (_, i) => 100 + (i - (n - 1) / 2) * 42);
        return xs
          .map(
            (x) =>
              `<circle cx="${x}" cy="104" r="18" fill="#fff" stroke="${INK}" stroke-width="3"/>` +
              `<circle cx="${x + 1}" cy="106" r="9" fill="${INK}"/>` +
              `<circle cx="${x - 4}" cy="99" r="3.4" fill="#fff"/>`,
          )
          .join("");
      };
      const MOUTH_REST = `<path d="M84 148 Q100 172 116 148 Z" fill="${INK}"/><path d="M94 148 L102 148 L98 158 Z" fill="#fff"/>`;

      // ======================= SEEDED RNG (deterministic per position) =======================
      const hashStr = (s) => { let h = 2166136261; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; };
      const mulberry32 = (seed) => { let a = seed; return () => { a |= 0; a = (a + 0x6d2b79f5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; };
      const rngFor = (...parts) => mulberry32(hashStr(parts.join("|")));

      // Catmull-Rom -> cubic bezier smoothing through points; closed=true wraps around.
      const smoothPath = (pts, closed) => {
        const n = pts.length;
        const get = (i) => (closed ? pts[(i + n) % n] : pts[Math.max(0, Math.min(n - 1, i))]);
        let d = `M${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
        const segs = closed ? n : n - 1;
        for (let i = 0; i < segs; i++) {
          const p0 = get(i - 1), p1 = get(i), p2 = get(i + 1), p3 = get(i + 2);
          const c1x = p1[0] + (p2[0] - p0[0]) / 6, c1y = p1[1] + (p2[1] - p0[1]) / 6;
          const c2x = p2[0] - (p3[0] - p1[0]) / 6, c2y = p2[1] - (p3[1] - p1[1]) / 6;
          d += ` C${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
        }
        if (closed) d += " Z";
        return d;
      };

      // ======================= VARIANT DEFINITIONS =======================
      const VARIANTS = [
        { key: "current", label: "Current (v1)", sub: "shipped art" },
        { key: "A", label: "A — Subtle refine", sub: "gentle organics", polish: true,
          blobJitter: 0.16, blobAnchors: 5,
          stripeWidth: [15, 21, 15], stripeWaveAmp: 10, stripeWidthFreq: 2.4 },
        { key: "B", label: "B — Hand-drawn", sub: "bolder wobble", polish: true,
          blobJitter: 0.30, blobAnchors: 5,
          stripeWidth: [12, 25, 12], stripeWaveAmp: 17, stripeWidthFreq: 2.8 },
        { key: "C", label: "C — Painterly", sub: "brushy + rotated", polish: true,
          blobJitter: 0.24, blobAnchors: 6, blobRot: true,
          stripeWidth: [14, 23, 13], stripeWaveAmp: 21, stripeWidthFreq: 3.4 },
      ];

      // ---- organic spot blobs ----
      const blobPattern = (si, uid, dk, variant) => {
        const blobs = BLOTCH[si]
          .map(([cx, cy], i) => {
            const rng = rngFor(variant.key, "spot", si, i);
            const n = variant.blobAnchors;
            const rot = variant.blobRot ? rng() * Math.PI * 2 : 0;
            const pts = Array.from({ length: n }, (_, k) => {
              const angle = (k / n) * Math.PI * 2 + rot + (rng() - 0.5) * 0.35;
              const r = 16 * (1 + (rng() * 2 - 1) * variant.blobJitter);
              return [cx + Math.cos(angle) * r, cy + Math.sin(angle) * r];
            });
            return `<path d="${smoothPath(pts, true)}" fill="${dk}"/>`;
          })
          .join("");
        return `<g clip-path="url(#bclip-${uid})">${blobs}</g>`;
      };

      // ---- tapered wavy ribbon stripes ----
      const ribbonPattern = (si, uid, dk, variant) => {
        const [wMin, wMid, wMax] = variant.stripeWidth;
        const N = 14;
        const bands = STRIPE_BANDS.map((y0, b) => {
          const rng = rngFor(variant.key, "stripe", si, b);
          const wavePhase = rng() * Math.PI * 2;
          const widthPhase = rng() * Math.PI * 2;
          const waveAmp = variant.stripeWaveAmp * (0.8 + rng() * 0.4);
          const top = [], bot = [];
          for (let i = 0; i <= N; i++) {
            const t = i / N;
            const x = -24 + t * 248;
            const cy = y0 + Math.sin(t * Math.PI + wavePhase) * waveAmp;
            const w = wMid + Math.sin(t * Math.PI * variant.stripeWidthFreq + widthPhase) * ((wMax - wMin) / 2);
            top.push([x, cy - w / 2]);
            bot.push([x, cy + w / 2]);
          }
          const pts = [...top, ...bot.reverse()];
          return `<path d="${smoothPath(pts, true)}" fill="${dk}"/>`;
        }).join("");
        return `<g clip-path="url(#bclip-${uid})">${bands}</g>`;
      };

      // ---- body polish: shading + belly patch (optional) + blush ----
      const polishLayers = (si, uid, color, showBelly = true) => {
        const belly = BELLY[si];
        const gradId = `bshade-${uid}`;
        const shading =
          `<defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">` +
          `<stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.10"/>` +
          `</linearGradient></defs>` +
          `<g clip-path="url(#bclip-${uid})">${SHAPES[si](`fill="url(#${gradId})"`)}</g>`;
        const bellyPatch = showBelly
          ? `<g clip-path="url(#bclip-${uid})"><ellipse cx="${belly.cx}" cy="${belly.cy}" rx="${belly.rx}" ry="${belly.ry}" fill="${lighten(color, 0.24)}" opacity="0.4"/></g>`
          : "";
        return shading + bellyPatch;
      };
      // Stroke gives the blush a defined edge so it still reads on a similarly-hued
      // body (pink) where fill-colour contrast alone is too low to see.
      const blushLayer = () =>
        `<circle cx="60" cy="136" r="11" fill="#ee4f6e" fill-opacity="0.4" stroke="${INK}" stroke-width="0.75" stroke-opacity="0.3"/>` +
        `<circle cx="140" cy="136" r="11" fill="#ee4f6e" fill-opacity="0.4" stroke="${INK}" stroke-width="0.75" stroke-opacity="0.3"/>`;

      // ======================= renderBlorb(variant) =======================
      const renderBlorb = (card, uid, variant) => {
        const [ci, ei, si, pi] = card;
        const color = COLORS[ci];
        const dk = darken(color, 0.44);
        const el = SHAPES[si];
        let pattern = "";
        if (variant.key === "current") {
          pattern =
            pi === 1
              ? `<g clip-path="url(#bclip-${uid})">${BLOTCH[si].map(([x, y]) => `<circle cx="${x}" cy="${y}" r="16" fill="${dk}"/>`).join("")}</g>`
              : pi === 2
                ? `<g clip-path="url(#bclip-${uid})">${STRIPE_BANDS.map((y) => `<path d="M-24 ${y} Q100 ${y + 17} 224 ${y}" fill="none" stroke="${dk}" stroke-width="21"/>`).join("")}</g>`
                : "";
        } else {
          pattern = pi === 1 ? blobPattern(si, uid, dk, variant) : pi === 2 ? ribbonPattern(si, uid, dk, variant) : "";
        }
        const polish = variant.polish ? polishLayers(si, uid, color) : "";
        const blush = variant.polish ? blushLayer() : "";
        const outlineWidth = variant.key === "B" ? 4.2 : 4.5;
        return (
          `<svg viewBox="0 0 200 214" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">` +
          `<defs><clipPath id="bclip-${uid}">${el("")}</clipPath></defs>` +
          `<g stroke="${INK}" stroke-width="3" stroke-linecap="round"><line x1="84" y1="46" x2="72" y2="16"/><line x1="116" y1="46" x2="128" y2="16"/></g>` +
          `<circle cx="72" cy="13" r="6" fill="${INK}"/><circle cx="128" cy="13" r="6" fill="${INK}"/>` +
          el(`fill="${color}"`) +
          polish +
          pattern +
          el(`fill="none" stroke="${INK}" stroke-width="${outlineWidth}"`) +
          blush +
          eyesSvg(ei + 1) +
          MOUTH_REST +
          `</svg>`
        );
      };

      // ======================= CONCEPT: antenna-style channel (replaces pattern) =======================
      // Instead of spots/stripes as the 3rd variable channel, vary the ANTENNA SILHOUETTE.
      // Antennae sit on uncrowded real estate (away from the busy face/body), so a shape
      // change there may read more crisply at small sizes than an area-fill pattern does.
      // Body is always solid + polished (shading/belly/blush) — no competing pattern.
      const ANTENNA_STYLES = [
        {
          key: "straight",
          label: "Straight (current)",
          path: (side) => (side < 0 ? "M84 46 L72 16" : "M116 46 L128 16"),
          tip: (side) => (side < 0 ? [72, 13] : [128, 13]),
          r: 6,
        },
        {
          key: "hook",
          label: "Hooked",
          path: (side) => (side < 0 ? "M84 46 C74 36 58 32 62 18 C64 10 76 9 78 17" : "M116 46 C126 36 142 32 138 18 C136 10 124 9 122 17"),
          tip: (side) => (side < 0 ? [78, 17] : [122, 17]),
          r: 5.5,
        },
        {
          key: "zigzag",
          label: "Zigzag",
          path: (side) => (side < 0 ? "M84 46 L74 36 L86 27 L70 16" : "M116 46 L126 36 L114 27 L130 16"),
          tip: (side) => (side < 0 ? [70, 13] : [130, 13]),
          r: 6,
        },
      ];

      const antennaSvg = (styleIdx) => {
        const st = ANTENNA_STYLES[styleIdx];
        return [-1, 1]
          .map((side) => {
            const [tx, ty] = st.tip(side);
            return (
              `<path d="${st.path(side)}" stroke="${INK}" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>` +
              `<circle cx="${tx}" cy="${ty}" r="${st.r}" fill="${INK}"/>`
            );
          })
          .join("");
      };

      // card = [colour, eyes, shape, antennaStyle] — pattern channel replaced by antenna style.
      const renderBlorbAntenna = (card, uid) => {
        const [ci, ei, si, ai] = card;
        const color = COLORS[ci];
        const el = SHAPES[si];
        return (
          `<svg viewBox="0 0 200 214" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">` +
          `<defs><clipPath id="bclip-${uid}">${el("")}</clipPath></defs>` +
          antennaSvg(ai) +
          el(`fill="${color}"`) +
          polishLayers(si, uid, color) +
          el(`fill="none" stroke="${INK}" stroke-width="4.5"`) +
          blushLayer() +
          eyesSvg(ei + 1) +
          MOUTH_REST +
          `</svg>`
        );
      };

      const antennaSection = () => {
        const cards = [
          [0, 2, 0, 0], [0, 2, 0, 1], [0, 2, 0, 2],
          [1, 1, 1, 0], [1, 1, 1, 1], [1, 1, 1, 2],
          [2, 0, 2, 0], [2, 0, 2, 1], [2, 0, 2, 2],
        ];
        let html =
          `<h2>Concept: antenna-style channel (replaces pattern)</h2>` +
          `<div class="sub">3rd channel becomes antenna silhouette — straight / hooked / zigzag — instead of solid/spots/stripes. Body always solid + polished.</div>` +
          `<div class="cols" style="grid-template-columns: repeat(3, 210px);">`;
        ANTENNA_STYLES.forEach((st, ai) => {
          html += `<div><div class="colhead">${st.label}</div>`;
          cards.filter((c) => c[3] === ai).forEach((c, i) => {
            html += `<div class="tile">${renderBlorbAntenna(c, `an-${ai}-${i}`)}</div>`;
          });
          html += `</div>`;
        });
        html += `</div>`;

        const miniCards = [[0, 1, 0, 0], [1, 0, 1, 1], [2, 1, 2, 2], [0, 2, 1, 0], [1, 1, 2, 1], [2, 0, 0, 2]];
        html +=
          `<h2>Antenna concept — small-size check (28px)</h2>` +
          `<div class="sub">All 3 styles across shapes, at found-slot size.</div>` +
          `<div class="minirow" style="width:fit-content;">`;
        miniCards.forEach((c, i) => {
          html += `<div class="mini">${renderBlorbAntenna(c, `anmini-${i}`)}</div>`;
        });
        html += `</div>`;
        return html;
      };

      // ======================= R2: refined cuteness + antenna TIP TOPPERS =======================
      // User feedback: keep antennae STALKS straight; vary only the TIP ornament
      // (ball / star / leaf) — and make the whole character cuter/more refined
      // (bigger glossy eyes, ground shadow) per their reference mockup.
      const eyesSvgCute = (n) => {
        const spacing = 44;
        const xs = Array.from({ length: n }, (_, i) => 100 + (i - (n - 1) / 2) * spacing);
        return xs
          .map(
            (x) =>
              `<circle cx="${x}" cy="105" r="19" fill="#fff" stroke="${INK}" stroke-width="3"/>` +
              `<circle cx="${x + 1}" cy="108" r="11" fill="${INK}"/>` +
              `<circle cx="${x - 5}" cy="98" r="4.3" fill="#fff"/>` +
              `<circle cx="${x + 6}" cy="113" r="1.9" fill="#fff" opacity="0.85"/>`,
          )
          .join("");
      };

      const groundShadow = () => `<ellipse cx="100" cy="206" rx="50" ry="7" fill="${INK}" opacity="0.15"/>`;

      const TIP_STYLES = [
        {
          key: "ball",
          label: "Straight (ball tip)",
          tip: (tx, ty) => `<circle cx="${tx}" cy="${ty}" r="10" fill="${INK}"/>`, // filled area ~314
        },
        {
          key: "star",
          label: "Star tips",
          tip: (tx, ty, side) => {
            const rO = 14, rI = 7.7; // filled area ~317 — matched to the ball, not just outer reach
            const pts = [];
            for (let i = 0; i < 10; i++) {
              const r = i % 2 === 0 ? rO : rI;
              const a = -Math.PI / 2 + (i * Math.PI) / 5;
              pts.push([Math.cos(a) * r, Math.sin(a) * r]);
            }
            const d = smoothPath(pts, true); // round the points off — sharp corners read as out of place against the soft/rounded rest of the character
            const angle = side < 0 ? -18 : 18; // follow the stalk's outward lean, same as the leaf tip
            return `<g transform="translate(${tx} ${ty}) rotate(${angle})"><path d="${d}" fill="#f0a91e" stroke="${INK}" stroke-width="2" stroke-linejoin="round"/></g>`;
          },
        },
        {
          key: "leaf",
          label: "Leaf tips",
          tip: (tx, ty, side) => {
            // Matching "reach past the tip" alone isn't enough: a solid disc (ball)
            // covers far more ink than a spiky star or a slender leaf of the same
            // radius, so the ball kept reading as bigger even at equal reach. These
            // dimensions are chosen so filled AREA (visual mass), not just reach,
            // is roughly equal across all three (~300-320 sq px each).
            // Fill area ≈253 (the bezier bulge peaks at ~0.75·w, not w); the 2px ink
            // stroke brings the painted silhouette to ≈310 — visually even with ball/star.
            const len = 18, w = 13, angle = side < 0 ? -22 : 22;
            return (
              `<g transform="translate(${tx} ${ty}) rotate(${angle})">` +
              `<path d="M0 2 C -${w} 2 -${w} ${2 - len * 0.6} 0 ${2 - len} C ${w} ${2 - len * 0.6} ${w} 2 0 2 Z" fill="#3fa346" stroke="${INK}" stroke-width="2"/>` +
              `<line x1="0" y1="0" x2="0" y2="${5 - len}" stroke="${INK}" stroke-width="1.1" opacity="0.6"/>` +
              `</g>`
            );
          },
        },
      ];

      // Antenna base attach points, tuned PER SHAPE so the base sits safely inside
      // each silhouette (antennae are drawn under the body fill — the base must be
      // covered by the body so the visible stalk appears to grow out of the head;
      // the round/ghost tops are wide, but the teardrop top is a narrow point, so
      // its attach point must sit lower/closer to centre or it floats disconnected).
      const ANTENNA_BASE = [
        { y: 50, lx: 76 }, // round
        { y: 48, lx: 74 }, // ghost
        { y: 74, lx: 80 }, // teardrop (narrow point up top — attach lower & narrower)
      ];
      const STALK_DX = 17, STALK_DY = 40;

      const antennaeCute = (si, styleIdx) => {
        const ts = TIP_STYLES[styleIdx];
        const base = ANTENNA_BASE[si];
        return [-1, 1]
          .map((side) => {
            const bx = side < 0 ? base.lx : 200 - base.lx;
            const by = base.y;
            const tx = side < 0 ? bx - STALK_DX : bx + STALK_DX;
            const ty = by - STALK_DY;
            return `<line x1="${bx}" y1="${by}" x2="${tx}" y2="${ty}" stroke="${INK}" stroke-width="4" stroke-linecap="round"/>` + ts.tip(tx, ty, side);
          })
          .join("");
      };

      // card = [colour, eyes, shape, tipStyle] — pattern channel replaced by antenna tip style.
      // No blush: visibility was inconsistent across the 3 body colours (strong on
      // blue, weak on pink) — dropped in favour of a simpler, consistently-readable face.
      const renderBlorbCute = (card, uid, tipIdx) => {
        const [ci, ei, si] = card;
        const color = COLORS[ci];
        const el = SHAPES[si];
        return (
          // viewBox top -10: worst ink is the ghost star/leaf at y≈-7.8; ~2 units of
          // margin for the star's Catmull-Rom overshoot. No wasted headroom — the
          // character renders as large as possible at every consumer size.
          `<svg viewBox="0 -10 200 224" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">` +
          `<defs><clipPath id="bclip-${uid}">${el("")}</clipPath></defs>` +
          groundShadow() +
          antennaeCute(si, tipIdx) +
          el(`fill="${color}"`) +
          polishLayers(si, uid, color, false) +
          el(`fill="none" stroke="${INK}" stroke-width="4.5"`) +
          eyesSvgCute(ei + 1) +
          MOUTH_REST +
          `</svg>`
        );
      };

      const beforeAfterSection = () => {
        const card = [0, 2, 0, 0];
        let html =
          `<h2>Before / after — cuteness refinement</h2>` +
          `<div class="sub">Same card (blue, 3 eyes, round): shipped art vs. refined body (bigger glossy eyes, ground shadow, ball-tip antennae).</div>` +
          `<div class="cols" style="grid-template-columns: repeat(2, 210px);">` +
          `<div><div class="colhead">Current (v1)</div><div class="tile">${renderBlorb(card, "ba-old", VARIANTS[0])}</div></div>` +
          `<div><div class="colhead">Refined</div><div class="tile">${renderBlorbCute(card, "ba-new", 0)}</div></div>` +
          `</div>`;
        return html;
      };

      const tipSection = () => {
        const cards = [
          [0, 2, 0], [0, 2, 1], [0, 2, 2],
          [1, 1, 1], [1, 1, 2], [1, 1, 0],
          [2, 0, 2], [2, 0, 0], [2, 0, 1],
        ];
        let html =
          `<h2>Concept R2: antenna tip toppers (straight / star / leaf)</h2>` +
          `<div class="sub">Stalk always straight; only the tip ornament changes. Refined cute body throughout.</div>` +
          `<div class="cols" style="grid-template-columns: repeat(3, 210px);">`;
        TIP_STYLES.forEach((ts, ti) => {
          html += `<div><div class="colhead">${ts.label}</div>`;
          cards.forEach((c, i) => {
            html += `<div class="tile">${renderBlorbCute(c, `tip-${ti}-${i}`, ti)}</div>`;
          });
          html += `</div>`;
        });
        html += `</div>`;

        const miniCards = [[0, 1, 0], [1, 0, 1], [2, 1, 2], [0, 2, 1], [1, 1, 2], [2, 0, 0]];
        html +=
          `<h2>Tip toppers — small-size check (28px)</h2>` +
          `<div class="sub">Each row is one tip style across shapes, at found-slot size.</div>`;
        TIP_STYLES.forEach((ts, ti) => {
          html += `<div class="colhead" style="text-align:left;margin-top:8px;">${ts.label}</div><div class="minirow" style="width:fit-content;">`;
          miniCards.forEach((c, i) => {
            html += `<div class="mini">${renderBlorbCute(c, `tipmini-${ti}-${i}`, ti)}</div>`;
          });
          html += `</div>`;
        });
        return html;
      };

      // ======================= page assembly =======================
      const SPOT_CARDS = [[0, 2, 0, 1], [1, 1, 1, 1], [2, 0, 2, 1]];
      const STRIPE_CARDS = [[0, 1, 0, 2], [1, 0, 1, 2], [2, 2, 2, 2]];
      const SOLID_CARDS = [[0, 1, 0, 0], [1, 1, 1, 0], [2, 1, 2, 0]];
      const MINI_CARDS = [[0, 1, 0, 1], [1, 0, 1, 2], [2, 1, 2, 1], [0, 2, 0, 2]];

      const section = (title, sub, cards, prefix) => {
        let html = `<h2>${title}</h2><div class="sub">${sub}</div><div class="cols">`;
        VARIANTS.forEach((v, vi) => {
          html += `<div><div class="colhead">${v.label}<span class="colsub">${v.sub || ""}</span></div>`;
          cards.forEach((c, i) => {
            html += `<div class="tile">${renderBlorb(c, `${prefix}-${vi}-${i}`, v)}</div>`;
          });
          html += `</div>`;
        });
        html += `</div>`;
        return html;
      };

      const miniSection = () => {
        let html = `<h2>Small-size check (28px, found-slot size)</h2><div class="sub">Same cards at the smallest render size the game uses — spots and stripes must still read here.</div><div class="cols">`;
        VARIANTS.forEach((v, vi) => {
          html += `<div><div class="colhead">${v.label}</div><div class="minirow">`;
          MINI_CARDS.forEach((c, i) => {
            html += `<div class="mini">${renderBlorb(c, `mini-${vi}-${i}`, v)}</div>`;
          });
          html += `</div></div>`;
        });
        html += `</div>`;
        return html;
      };

      let html = "";
      html += beforeAfterSection();
      html += tipSection();
      html += antennaSection();
      html += section("Spots", "Round · ghost · teardrop, mixed colours and eye counts.", SPOT_CARDS, "sp");
      html += section("Stripes", "Round · ghost · teardrop, mixed colours and eye counts.", STRIPE_CARDS, "st");
      html += section("Solid (body polish only)", "Shading, belly patch, blush — no pattern to distract.", SOLID_CARDS, "so");
      html += miniSection();
      document.getElementById("app").innerHTML = html;
    </script>
  </body>
</html>
